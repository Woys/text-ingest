name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff format --check src tests examples
          ruff check src tests examples
      - name: Fetcher docs check
        run: PYDANTIC_DISABLE_PLUGINS=__all__ python scripts/check_fetcher_docs.py
      - name: Sink docs check
        run: PYDANTIC_DISABLE_PLUGINS=__all__ python scripts/check_sink_docs.py
      - name: Typecheck
        run: mypy src
      - name: Tests
        run: pytest --cov=data_ingestion --cov-report=term-missing --cov-report=xml
      - name: Build package
        run: python -m build
